<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Echo 2026</title>
    <style>
        body { 
            background: radial-gradient(circle, #0f0000 0%, #000 100%); 
            color: #8b0000; font-family: 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        #game-box { 
            text-align: center; max-width: 600px; padding: 40px;
            border: 1px solid #300; background: rgba(0,0,0,0.9);
            box-shadow: 0 0 30px #400; border-radius: 5px;
        }
        .glitch { animation: shake 0.5s infinite; text-shadow: 2px 2px #f00; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }
        button { 
            background: #1a0000; color: #ff4d4d; border: 1px solid #400;
            padding: 15px 30px; margin: 10px; cursor: pointer;
            font-size: 18px; transition: 0.3s; width: 100%;
        }
        button:hover { background: #400; color: #fff; box-shadow: 0 0 20px #f00; }
        p { color: #ccc; font-size: 20px; line-height: 1.6; min-height: 120px; }
    </style>
</head> 
<body>
    <div id="game-box">
        <h1 class="glitch">صـدى الصـمـت</h1>
        <p id="msg">أنت لا تتذكر كيف وصلت هنا.. الزنزانة باردة، وهناك صوت خربشة خلف الجدار الأحمر. ماذا ستفعل؟</p>
        <div id="btns">
            <button onclick="next('تضع أذنك على الجدار.. فجأة تتوقف الخربشة، وتسمع صوت أنفاس ثقيلة خلفك مباشرة!', 'التفت بسرعة', 'أركض للجهة الأخرى')">أقترب من الجدار</button>
            <button onclick="next('تحاول فتح الباب، لكن المقبض يتحول إلى يد بشرية باردة تمسك يدك!', 'اصرخ', 'احاول سحب يدي')">أحاول فتح الباب</button>
        </div>
    </div>
    <script>
        function next(txt, b1, b2) {
            document.getElementById('msg').innerText = txt;
            if(b1) {
                document.getElementById('btns').innerHTML = `<button onclick="location.reload()">${b1}</button><button onclick="location.reload()">${b2}</button>`;
            }
        }
    </script>
</body>
</html>
