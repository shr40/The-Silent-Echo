<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Echo | صدى الصمت</title>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { text-align: center; max-width: 500px; padding: 30px; border: 2px solid #333; border-radius: 15px; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #888; font-size: 24px; margin-bottom: 20px; }
        p { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .buttons { display: flex; flex-direction: column; gap: 10px; }
        button { background: #222; color: #ccc; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #333; color: white; border-color: #666; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>صدى الصمت</h1>
        <p id="text">تستيقظ في مكان مظلم.. لا تسمع سوى صدى أنفاسك المكتومة. البرد يقرص جلدك والظلام دامس. ماذا ستفعل؟</p>
        <div id="options" class="buttons">
            <button onclick="nextStep('تبحث عن مخرج في الظلام.. تعثر على باب خشبي قديم يصدر صريراً مخيفاً.', 'افتح الباب')">أبحث عن مخرج</button>
            <button onclick="nextStep('تصرخ بأعلى صوتك.. لكن الصدى يعود إليك مرعباً وكأن هناك من يقلدك في الزاوية.', 'من هناك؟')">أصرخ طلباً للمساعدة</button>
        </div>
    </div>
    <script>
        function nextStep(newText, btnText) {
            document.getElementById('text').innerText = newText;
            document.getElementById('options').innerHTML = `<button onclick="location.reload()">${btnText ? btnText : 'ابدأ من جديد'}</button>`;
        }
    </script>
</body>
</html>
